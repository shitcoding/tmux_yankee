name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify tag matches VERSION
        run: |
          want="v$(tr -d '[:space:]' < VERSION)"
          if [ "${GITHUB_REF_NAME}" != "$want" ]; then
            echo "::error::pushed tag ${GITHUB_REF_NAME} does not match VERSION file (${want}); binaries would self-report the wrong version and clients would re-download every load"
            exit 1
          fi

      - name: Cross-compile binaries
        run: |
          mkdir -p bin

          GOFLAGS="-trimpath"
          # Stamp the version from the VERSION file so `tmux-yankee -version`
          # reports it and install.sh can detect a stale binary. The VERSION
          # file must match the release tag (v<VERSION>).
          VERSION="$(cat VERSION)"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=darwin GOARCH=arm64 go build $GOFLAGS -ldflags "$LDFLAGS" \
            -o bin/tmux-yankee-darwin-arm64 ./cmd/tmux-yankee

          GOOS=darwin GOARCH=amd64 go build $GOFLAGS -ldflags "$LDFLAGS" \
            -o bin/tmux-yankee-darwin-amd64 ./cmd/tmux-yankee

          GOOS=linux GOARCH=amd64 go build $GOFLAGS -ldflags "$LDFLAGS" \
            -o bin/tmux-yankee-linux-amd64 ./cmd/tmux-yankee

          GOOS=linux GOARCH=arm64 go build $GOFLAGS -ldflags "$LDFLAGS" \
            -o bin/tmux-yankee-linux-arm64 ./cmd/tmux-yankee

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/tmux-yankee-darwin-arm64
            bin/tmux-yankee-darwin-amd64
            bin/tmux-yankee-linux-amd64
            bin/tmux-yankee-linux-arm64
